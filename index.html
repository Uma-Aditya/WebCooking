    <style>
        :root {
            --app-bg: #1e1e1e;
            --sidebar-bg: #252526;
            --tab-bar-bg: #2d2d2d;
            --active-tab-bg: #1e1e1e;
            --activity-bar-bg: #333333;
            --border-color: #3c3c3c;
            --status-bar-bg: #007acc;
            --text-primary: #d4d4d4;
            --text-muted: #858585;
            --hover-highlight: #2a2d2e;
            --active-highlight: #094771;
            --title-bar-bg: #3c3c3c;
        }

        body {
            background-color: var(--app-bg);
            color: var(--text-primary);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .title-bar {
            height: 30px;
            background-color: var(--title-bar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 100;
        }

        .title-bar-dots {
            position: absolute;
            left: 12px;
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .menu-bar {
            height: 24px;
            background-color: var(--title-bar-bg);
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            padding: 0 4px;
            font-size: 12px;
            color: #ccc;
        }

        .menu-item {
            padding: 2px 8px;
            cursor: pointer;
            border-radius: 3px;
        }

        .menu-item:hover {
            background-color: #555;
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .activity-bar {
            width: 48px;
            background-color: var(--activity-bar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
        }

        .activity-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
        }

        .activity-icon.active {
            color: #fff;
            border-left: 2px solid #fff;
        }

        .activity-icon:hover:not(.active) {
            color: #ccc;
        }

        .sidebar {
            width: 260px;
            min-width: 160px;
            max-width: 400px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .sidebar-resize-handle {
            position: absolute;
            right: -2px;
            top: 0;
            bottom: 0;
            width: 4px;
            cursor: col-resize;
            z-index: 50;
        }

        .sidebar-resize-handle:hover {
            background-color: var(--status-bar-bg);
        }

        .sidebar-header {
            padding: 12px 16px 6px;
            font-size: 11px;
            font-weight: bold;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .sidebar-project-name {
            padding: 4px 16px;
            font-size: 11px;
            color: #bbb;
        }

        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--app-bg);
            overflow: hidden;
        }

        .tab-bar {
            height: 35px;
            background-color: var(--tab-bar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tab-bar::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 0 16px;
            height: 100%;
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #969696;
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            position: relative;
            white-space: nowrap;
        }

        .tab.active {
            background-color: var(--active-tab-bg);
            color: #fff;
            border-top: 1px solid var(--status-bar-bg);
        }

        .tab:hover:not(.active) {
            background-color: var(--hover-highlight);
        }

        .tab-close {
            margin-left: 8px;
            opacity: 0;
            font-size: 14px;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
        }

        .tab:hover .tab-close {
            opacity: 1;
        }

        .tab-close:hover {
            background-color: #444;
        }

        .breadcrumb-bar {
            height: 22px;
            background-color: var(--app-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 0 12px;
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #888;
        }

        .editor-split-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-pane {
            flex: 0 0 58%;
            background-color: var(--app-bg);
            border-bottom: 1px solid var(--border-color);
            overflow: auto;
            padding: 40px;
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: #444 transparent;
        }

        .top-pane::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .top-pane::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 5px;
        }

        .top-pane::-webkit-scrollbar-track {
            background: transparent;
        }

        .placeholder-box {
            width: 80%;
            height: 80%;
            border: 2px dashed #444;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 13px;
        }

        .bottom-pane {
            flex: 0 0 42%;
            background-color: var(--app-bg);
            overflow-y: auto;
            display: flex;
        }

        .line-numbers {
            width: 36px;
            color: #404040;
            font-size: 12px;
            text-align: right;
            padding-right: 8px;
            padding-top: 16px;
            border-right: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .code-area {
            flex: 1;
            padding: 16px;
            padding-left: 16px;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .status-bar {
            height: 22px;
            background-color: var(--status-bar-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            font-size: 11px;
            color: #fff;
        }

        .status-bar-left, .status-bar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .explorer-tree {
            flex: 1;
            overflow-y: auto;
            padding-top: 4px;
        }

        .tree-item {
            display: flex;
            align-items: center;
            padding: 2px 16px;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            white-space: nowrap;
        }

        .tree-item:hover {
            background-color: var(--hover-highlight);
        }

        .tree-item.active {
            background-color: var(--active-highlight);
        }

        .tree-icon {
            margin-right: 6px;
            width: 16px;
            text-align: center;
        }

        .folder-arrow {
            font-size: 10px;
            width: 12px;
            transition: transform 0.1s;
        }

        .folder-arrow.open {
            transform: rotate(90deg);
        }

        /* 1. Smooth Slide Transition Animation */
        #image-pane img {
          animation: fadeSlideIn 0.25s ease-out;
        }
        #explanation-pane > div {
          animation: lineReveal 0.3s ease-out both;
        }
        @keyframes fadeSlideIn {
          from { opacity: 0; transform: translateY(8px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes lineReveal {
          from { opacity: 0; transform: translateX(-6px); }
          to   { opacity: 1; transform: translateX(0); }
        }
        /* Staggered line reveal delays */
        #explanation-pane > div:nth-child(1)  { animation-delay: 0.00s; }
        #explanation-pane > div:nth-child(2)  { animation-delay: 0.02s; }
        #explanation-pane > div:nth-child(3)  { animation-delay: 0.04s; }
        #explanation-pane > div:nth-child(4)  { animation-delay: 0.06s; }
        #explanation-pane > div:nth-child(5)  { animation-delay: 0.08s; }
        #explanation-pane > div:nth-child(6)  { animation-delay: 0.10s; }
        #explanation-pane > div:nth-child(7)  { animation-delay: 0.12s; }
        #explanation-pane > div:nth-child(8)  { animation-delay: 0.14s; }
        #explanation-pane > div:nth-child(9)  { animation-delay: 0.16s; }
        #explanation-pane > div:nth-child(10) { animation-delay: 0.18s; }
        #explanation-pane > div:nth-child(11) { animation-delay: 0.20s; }
        #explanation-pane > div:nth-child(12) { animation-delay: 0.22s; }
        #explanation-pane > div:nth-child(13) { animation-delay: 0.24s; }
        #explanation-pane > div:nth-child(14) { animation-delay: 0.26s; }
        #explanation-pane > div:nth-child(15) { animation-delay: 0.28s; }
        #explanation-pane > div:nth-child(16) { animation-delay: 0.30s; }
        #explanation-pane > div:nth-child(17) { animation-delay: 0.32s; }
        #explanation-pane > div:nth-child(18) { animation-delay: 0.34s; }

        /* 2. Code pane typography */
        .code-line-heading {
          font-family: 'Inter', sans-serif !important;
          font-size: 14px !important;
          font-weight: 700 !important;
          letter-spacing: 0.5px;
          text-transform: none;
        }
        .code-line-subheading {
          font-family: 'Inter', sans-serif !important;
          font-size: 13px !important;
          font-weight: 600 !important;
        }

        /* 3. Cursor Blink Animation */
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }
        .cursor-blink {
          animation: blink 1s step-end infinite;
        }

        /* 4. Hover Tooltip */
        .file-item { position: relative; }
        .file-item:hover::after {
          content: attr(data-tooltip);
          position: absolute;
          left: 105%;
          top: 50%;
          transform: translateY(-50%);
          background: #252526;
          border: 1px solid #454545;
          color: #d4d4d4;
          font-size: 11px;
          padding: 4px 8px;
          border-radius: 4px;
          white-space: nowrap;
          z-index: 999;
          pointer-events: none;
        }

        /* 5. Slide counter badge */
        #slide-counter {
          background: rgba(255,255,255,0.15);
          padding: 1px 8px;
          border-radius: 3px;
          font-weight: 600;
          letter-spacing: 0.5px;
        }
    </style>
</head>

                    { id: 'ss_analytics', name: 'analytics_charts.md', type: 'file' },
                    { id: 'ss_admin', name: 'admin_panel.md', type: 'file' }
                ]
            },
            { 
                name: '06.5_UML_Diagrams', type: 'folder', children: [
                    { id: 'uml_architecture', name: 'high_level_architecture.md', type: 'file' },
                    { id: 'uml_hl_flow', name: 'high_level_flow_chart.md', type: 'file' },
                    { id: 'uml_component', name: 'component_diagram.md', type: 'file' },
                    { id: 'uml_deployment', name: 'deployment_diagram.md', type: 'file' },
                    { id: 'uml_db_schema', name: 'database_schema.md', type: 'file' },
                    { id: 'uml_ll_db', name: 'low_level_database.md', type: 'file' },
                    { id: 'uml_use_case', name: 'use_case_diagram.md', type: 'file' },
                    { id: 'uml_use_case_perfo', name: 'use_case_perfo.md', type: 'file' },
                    { id: 'uml_class', name: 'class_diagram.md', type: 'file' },
                    { id: 'uml_seq_register', name: 'seq_student_registration.md', type: 'file' },
                    { id: 'uml_seq_login', name: 'seq_login.md', type: 'file' },
                    { id: 'uml_seq_test', name: 'seq_take_test.md', type: 'file' },
                    { id: 'uml_seq_marks', name: 'seq_upload_marks.md', type: 'file' },
                    { id: 'uml_seq_ai_test', name: 'seq_create_ai_test.md', type: 'file' },
                    { id: 'uml_act_take_test', name: 'act_student_take_test.md', type: 'file' },
                    { id: 'uml_act_marks', name: 'act_faculty_upload_marks.md', type: 'file' },
                    { id: 'uml_act_ai_test', name: 'act_ai_test_creation.md', type: 'file' },
                    { id: 'uml_state_test', name: 'state_test_creation.md', type: 'file' },
                    { id: 'uml_ll_flow', name: 'low_level_flow_chart.md', type: 'file' }
                ]
            },
            { 
                name: '07_Results', type: 'folder', children: [
                    { id: 'results', name: 'performance_metrics.md', type: 'file' },
                    { id: 'features', name: 'feature_summary.md', type: 'file' }
                ]
            },
            { id: 'conclusion', name: 'conclusion.md', type: 'file' }
        ];

        // --- 3. TREE RENDERING ---
        function createTreeItem(item, level = 0) {
            const container = document.createElement('div');
            container.className = 'tree-container';
            
            const element = document.createElement('div');
            element.className = 'tree-item';
            element.style.paddingLeft = `${level * 16 + 8}px`;
            
            if (item.type === 'folder') {
                const arrow = document.createElement('span');
                arrow.className = 'tree-icon folder-arrow';
                arrow.innerHTML = '›';
                element.appendChild(arrow);
                
                const icon = document.createElement('span');
                icon.className = 'tree-icon';
                icon.innerHTML = '📁';
                element.appendChild(icon);
                
                const name = document.createElement('span');
                name.textContent = item.name;
                element.appendChild(name);
                
                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'hidden tree-children';
                item.children.forEach(child => {
                    childrenContainer.appendChild(createTreeItem(child, level + 1));
                });
                
                element.onclick = () => {
                    arrow.classList.toggle('open');
                    childrenContainer.classList.toggle('hidden');
                    icon.innerHTML = arrow.classList.contains('open') ? '📂' : '📁';
                };
                
                container.appendChild(element);
                container.appendChild(childrenContainer);
            } else {
                const icon = document.createElement('span');
                icon.className = 'tree-icon text-[#569cd6]';
                icon.innerHTML = '●';
                element.appendChild(icon);
                
                const name = document.createElement('span');
                name.textContent = item.name;
                element.appendChild(name);
                
                element.className += ' file-item';
                element.dataset.slideId = item.id;
                
                const tooltips = {
                    readme: "Project overview",
                    abstract: "What we built",
                    problem: "Why we built it",
                    architecture: "System design",
                    conclusion: "Summary & future work"
                };
                if (tooltips[item.id]) element.dataset.tooltip = tooltips[item.id];

                element.onclick = () => loadSlide(item.id);
                
                container.appendChild(element);
            }
            
            return container;
        }

        const explorerTree = document.getElementById('explorer-tree');
        treeData.forEach(item => {
            explorerTree.appendChild(createTreeItem(item));
        });

        // --- 4. SLIDE RENDERING ---
        const openTabs = [];

        function loadSlide(slideId) {
            if (typeof SLIDES === 'undefined') return;
            const slide = SLIDES[slideId];
            if (!slide) return;

            const idx = SLIDE_ORDER.indexOf(slideId);
            if (idx !== -1) currentSlideIndex = idx;

            const imagePane = document.getElementById('image-pane');
            imagePane.innerHTML = '';
            const img = document.createElement('img');
            img.src = slide.image;
            img.alt = slide.title;
            
            // Intelligent sizing: Diagrams/Screenshots start larger but zoomable
            const isDiagram = slideId.startsWith('uml_') || slideId.startsWith('ss_') || slideId.includes('screenshot') || slideId.includes('diagram');
            
            img.style.cssText = `
                display: block;
                margin: 0 auto;
                border-radius: 6px;
                box-shadow: 0 8px 32px rgba(0,0,0,0.6);
                cursor: zoom-in;
                transition: transform 0.2s ease, max-width 0.2s ease;
                max-width: ${isDiagram ? '98%' : '90%'};
                max-height: ${isDiagram ? 'none' : '95%'};
            `;

            let zoomed = false;
            img.onclick = () => {
                zoomed = !zoomed;
                if (zoomed) {
                    img.style.maxWidth = '180%';
                    img.style.cursor = 'zoom-out';
                } else {
                    img.style.maxWidth = isDiagram ? '98%' : '90%';
                    img.style.cursor = 'zoom-in';
                }
            };

            imagePane.appendChild(img);
            imagePane.scrollTop = 0; // Reset scroll on new slide

            const explPane = document.getElementById('explanation-pane');
            explPane.innerHTML = '';

            // Extended color map — syntax types + semantic highlight types
            const colorMap = {
                comment:    '#6a9955',  // green  — // comments
                keyword:    '#569cd6',  // blue   — labels, section names
                string:     '#ce9178',  // orange — values, facts
                plain:      '#d4d4d4',  // gray   — normal body text
                blank:      '#d4d4d4',  // empty line
                heading:    '#ffffff',  // white bold — slide title
                subheading: '#c8c8c8',  // light gray — sub-sections
                highlight:  '#dcdcaa',  // yellow — important terms (VS Code var color)
                gold:       '#f1c040',  // bright gold — key achievements
                success:    '#4ec994',  // teal  — ✅ checkmarks, positives
                error:      '#f48771',  // red-orange — ❌ problems
                number:     '#b5cea8',  // light green — numeric values
                tag:        '#4ec9b0',  // teal — role/tag names
            };

            slide.lines.forEach((line, index) => {
                const row = document.createElement('div');
                row.style.cssText = `display:flex;align-items:flex-start;min-height:${line.type==='heading'?'28px':'22px'};`;

                const numEl = document.createElement('span');
                numEl.textContent = line.type === 'blank' ? '' : index + 1;
                numEl.style.cssText = 'min-width:36px;text-align:right;padding-right:16px;color:#3c3c3c;font-size:11px;line-height:22px;user-select:none;flex-shrink:0;font-family:monospace;margin-top:3px;';

                const codeEl = document.createElement('span');

                if (line.type === 'heading') {
                    // Heading: Inter font, bold, larger, with a left accent bar
                    codeEl.className = 'code-line-heading';
                    codeEl.style.cssText = `color:#ffffff;font-weight:700;font-size:15px;line-height:28px;font-family:'Inter',sans-serif;letter-spacing:0.3px;padding-left:8px;border-left:3px solid #569cd6;`;
                    codeEl.textContent = line.text;
                } else if (line.type === 'subheading') {
                    codeEl.className = 'code-line-subheading';
                    codeEl.style.cssText = `color:#c8c8c8;font-weight:600;font-size:13px;line-height:22px;font-family:'Inter',sans-serif;`;
                    codeEl.textContent = line.text;
                } else if (line.parts) {
                    // Multi-color parts within one line
                    codeEl.style.cssText = `font-size:13px;line-height:22px;font-family:'Cascadia Code','Consolas',monospace;white-space:pre-wrap;word-break:break-word;`;
                    line.parts.forEach(part => {
                        const partEl = document.createElement('span');
                        partEl.textContent = part.text;
                        partEl.style.color = colorMap[part.type] || '#d4d4d4';
                        if (part.bold) partEl.style.fontWeight = 'bold';
                        if (part.type === 'highlight') partEl.style.backgroundColor = 'rgba(220,220,170,0.08)';
                        codeEl.appendChild(partEl);
                    });
                } else {
                    const color = colorMap[line.type] || '#d4d4d4';
                    codeEl.style.cssText = `color:${color};font-size:13px;line-height:22px;font-family:'Cascadia Code','Consolas',monospace;white-space:pre-wrap;word-break:break-word;`;
                    if (line.type === 'highlight') codeEl.style.backgroundColor = 'rgba(220,220,170,0.06)';
                    if (line.type === 'gold') { codeEl.style.fontWeight = '600'; }
                    codeEl.textContent = line.type === 'blank' ? '\u00A0' : line.text;
                }

                row.appendChild(numEl);
                row.appendChild(codeEl);
                explPane.appendChild(row);

                // Blinking cursor on last non-blank line
                if (index === slide.lines.length - 1) {
                    const cursor = document.createElement('span');
                    cursor.textContent = '█';
                    cursor.className = 'cursor-blink';
                    cursor.style.cssText = 'color:#569cd6;font-size:12px;margin-left:3px;';
                    codeEl.appendChild(cursor);
                }
            });

            updateTabs(slideId, slide.title);
            document.getElementById('breadcrumb-bar').textContent = slide.breadcrumb;
            document.getElementById('status-bar-filename').textContent = slide.title;
            const counter = document.getElementById('slide-counter');
            if (counter) counter.textContent = `${idx + 1} / ${SLIDE_ORDER.length}`;

            document.querySelectorAll('.file-item').forEach(el => {
                el.classList.remove('active');
                el.style.background = '';
            });
            const treeItem = document.querySelector(`[data-slide-id="${slideId}"]`);
            if (treeItem) {
                treeItem.classList.add('active');
                treeItem.style.background = '#094771';
            }
        }

        function updateTabs(slideId, title) {
            if (!openTabs.find(t => t.slideId === slideId)) {
                openTabs.push({ slideId, title });
            }

            const tabBar = document.getElementById('tab-bar');
            tabBar.innerHTML = '';

            openTabs.forEach(tab => {
                const isActive = tab.slideId === slideId;
                const tabEl = document.createElement('div');
                tabEl.className = 'tab' + (isActive ? ' active' : '');
                tabEl.innerHTML = `
                    <span style="color:#569cd6;font-size:8px;margin-right:6px;">●</span>
                    <span>${tab.title}</span>
                    <span class="tab-close" style="opacity:${isActive?1:0}">×</span>
                `;
                
                tabEl.onclick = () => loadSlide(tab.slideId);
                const closeBtn = tabEl.querySelector('.tab-close');
                closeBtn.onclick = (e) => {
                    e.stopPropagation();
                    const idx = openTabs.findIndex(t => t.slideId === tab.slideId);
                    openTabs.splice(idx, 1);
                    if (openTabs.length > 0) {
                        loadSlide(openTabs[Math.max(0, idx - 1)].slideId);
                    } else {
                        location.reload();
                    }
                };
                tabBar.appendChild(tabEl);
            });
        }

        function scrollSidebarToActive() {
            const activeEl = document.querySelector('.file-item.active');
            if (activeEl) {
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                let p = activeEl.parentElement;
                while (p && p.id !== 'sidebar') {
                    if (p.classList.contains('tree-children')) {
                        p.classList.remove('hidden');
                        const folder = p.previousElementSibling;
                        if (folder) {
                            folder.querySelector('.folder-arrow')?.classList.add('open');
                            const iconEl = folder.querySelector('.tree-icon:nth-child(2)'); if (iconEl) iconEl.innerHTML = '📂';
                        }
                    }
                    p = p.parentElement;
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowRight', 'ArrowDown', ' '].includes(e.key)) {
                e.preventDefault();
                currentSlideIndex = Math.min(currentSlideIndex + 1, SLIDE_ORDER.length - 1);
                loadSlide(SLIDE_ORDER[currentSlideIndex]);
                scrollSidebarToActive();
            } else if (['ArrowLeft', 'ArrowUp'].includes(e.key)) {
                e.preventDefault();
                currentSlideIndex = Math.max(currentSlideIndex - 1, 0);
                loadSlide(SLIDE_ORDER[currentSlideIndex]);
                scrollSidebarToActive();
            } else if (e.key === 'Escape') {
                document.querySelectorAll('.tree-children').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('.folder-arrow').forEach(el => el.classList.remove('open'));
            }
        });

        const sidebar = document.getElementById('sidebar');
        const resizeHandle = document.getElementById('resize-handle');
        let isResizing = false;
        resizeHandle.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const w = e.clientX - 48;
            if (w >= 160 && w <= 400) sidebar.style.width = w + 'px';
        });
        document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; });

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                if (typeof SLIDES !== 'undefined' && Object.keys(SLIDES).length > 0) loadSlide('readme');
            }, 100);
        });
    </script>
